id: gaming-station
name: "Gaming Station"
description: "Steam in container, Sunshine on host. Moonlight-ready gaming environment with NVIDIA GPU passthrough."
icon: "🎮"
category: gaming
network: "full"
tags:
  - gaming
  - steam
  - sunshine
  - moonlight
  - nvidia
  - streaming

image: "ghcr.io/games-on-whales/steam:edge"

environment:
  DISPLAY: ":0"
  PULSE_SERVER: "unix:/tmp/pulse/native"
  GOW_REQUIRED_DEVICES: "/dev/uinput /dev/input/event*"

resources:
  cpu_limit: "0.0"
  memory_limit: "0"
  timeout_seconds: 0
  pids_limit: 0

mounts:
  - type: "bind"
    host: "/data/services/gaming-station/data/steam-home"
    container: "/home/default/.steam"
    mode: "rw"
  - type: "bind"
    host: "/data/services/gaming-station/data/games"
    container: "/mnt/games"
    mode: "rw"
  - type: "bind"
    host: "/data/services/gaming-station/config"
    container: "/config"
    mode: "rw"

devices:
  - "/dev/dri"
  - "/dev/uinput"
  - "/dev/input"

ipc_mode: "host"

healthcheck:
  test: ["CMD-SHELL", "pgrep -f steam || exit 1"]
  interval: "30s"
  timeout: "10s"
  retries: 3
  start_period: "120s"

system_prompt: |
  You are assisting with the gaming-station container.
  Steam runs inside this container. Sunshine streams from the host.
  Use supervisorctl to manage processes inside the container.
  For deep diagnostics, refer to the loaded container_addons context.
