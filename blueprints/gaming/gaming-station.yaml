id: gaming-station
name: "Gaming Station"
description: "Steam in container, Sunshine on host. Moonlight-ready gaming environment with NVIDIA GPU passthrough."
icon: "🎮"
category: gaming
network: "full"
tags:
  - gaming
  - steam
  - sunshine
  - moonlight
  - nvidia
  - streaming

dockerfile: |
  FROM josh5/steam-headless:latest

  RUN python3 -c 'from pathlib import Path; import base64; Path('"'"'/usr/local/bin/start-steam-host-bridge.sh'"'"').write_bytes(base64.b64decode('"'"''"'"')); Path('"'"'/usr/local/bin/start-steam-host-bridge.sh'"'"').chmod(0o755)'
  RUN python3 -c 'from pathlib import Path; import base64; Path('"'"'/etc/cont-init.d/93-configure_host_bridge.sh'"'"').write_bytes(base64.b64decode('"'"''"'"')); Path('"'"'/etc/cont-init.d/93-configure_host_bridge.sh'"'"').chmod(0o755)'
  RUN python3 -c 'from pathlib import Path; import base64; Path('"'"'/etc/cont-init.d/92-fix_streaming_perms.sh'"'"').write_bytes(base64.b64decode('"'"''"'"')); Path('"'"'/etc/cont-init.d/92-fix_streaming_perms.sh'"'"').chmod(0o755)'
  RUN python3 -c 'from pathlib import Path; import base64; p=Path('"'"'/etc/cont-init.d/60-configure_gpu_driver.sh'"'"'); p.write_bytes(base64.b64decode('"'"'aWYgWyAiJHtUUklPTl9IT1NUX0RJU1BMQVlfQlJJREdFOi1mYWxzZX0iID0gInRydWUiIF07IHRoZW4KICAgIHByaW50X2hlYWRlciAiU2tpcHBpbmcgaW50ZXJuYWwgR1BVIGRyaXZlciBpbnN0YWxsIGluIGhvc3QtZGlzcGxheSBicmlkZ2UgbW9kZSIKICAgIGVjaG8gLWUgIlxlWzM0bURPTkVcZVswbSIKICAgIHJldHVybiAwIDI+L2Rldi9udWxsIHx8IHRydWUKZmkKCg=='"'"') + p.read_bytes())'
privileged: true

cap_add:
  - NET_ADMIN
  - SYS_ADMIN
  - SYS_NICE

security_opt:
  - seccomp=unconfined
  - apparmor=unconfined

runtime: nvidia

ipc_mode: "host"

storage_scope: "gaming-station-host-bridge"

resources:
  cpu_limit: "1.5"
  memory_limit: "1536m"
  memory_swap: "2048m"
  timeout_seconds: 0
  pids_limit: 512

environment:
  TZ: "UTC"
  PUID: "1000"
  PGID: "1000"
  STEAM_USER: "vault://STEAM_USERNAME"
  STEAM_PASS: "vault://STEAM_PASSWORD"
  STEAM_ARGS: ""
  MODE: "secondary"
  DISPLAY: ":0"
  TRION_HOST_DISPLAY_BRIDGE: "true"
  PULSE_SERVER: "unix:/tmp/host-pulse/native"
  NVIDIA_VISIBLE_DEVICES: "all"
  NVIDIA_DRIVER_CAPABILITIES: "all"
  ENABLE_SUNSHINE: "false"

mounts:
  - type: "bind"
    host: "/data/services/gaming-station/config"
    container: "/config"
    mode: "rw"
  - type: "bind"
    host: "/data/services/gaming-station/data/steam-home"
    container: "/home/default/.steam"
    mode: "rw"
  - type: "bind"
    host: "/tmp/.X11-unix"
    container: "/tmp/.X11-unix"
    mode: "rw"
  - type: "bind"
    host: "/run/user/1000/pulse"
    container: "/tmp/host-pulse"
    mode: "rw"

devices:
  - "/dev/dri"
  - "/dev/uinput"
  - "/dev/input"

secrets_required:
  - name: STEAM_USERNAME
    description: "Steam account username"
    optional: true
  - name: STEAM_PASSWORD
    description: "Steam account password"
    optional: true

healthcheck:
  test: ["CMD-SHELL", "pgrep -f steam || exit 1"]
  interval: "30s"
  timeout: "10s"
  retries: 3
  start_period: "120s"

system_prompt: |
  You are assisting with the gaming-station container.
  Steam runs inside this container. Sunshine streams from the host.
  Use supervisorctl to manage processes inside the container.
  For deep diagnostics, refer to the loaded container_addons context.
